    <div class="flex items-center justify-between gap-3">

      <ul class="mt-3 list-disc space-y-2 pl-5 text-sm text-on-surface-variant">
        <li data-i18n="privacy_1">默认不上传原始历史资料到云端存储。</li>
        <li data-i18n="privacy_2">敏感配置可在本地系统能力下加密保存。</li>
        <li data-i18n="privacy_3">你可以导出并迁移自己的数据，不被单一平台绑定。</li>
